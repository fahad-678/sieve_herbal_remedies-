name: sieve_herbal_remedies
description: A comprehensive herbal remedies mobile application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  url_launcher: ^6.3.0
  pdf: ^3.12.0
  printing: ^5.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.12.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
    - assets/herbs_data.json
    - assets/herb_images/

flutter_icons:
  android: true
  ios: false
  image_path: "assets/images/app-icon.png"
